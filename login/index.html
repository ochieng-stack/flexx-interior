<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexx Interior Admin</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>

<body>

<div class="admin-container">

<h2>Admin Login</h2>

<form id="login-form">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>


<form id="admin-form" style="display:none;">

<h2>Upload Project</h2>

<label>Category</label>

<select id="category">
<option value="kitchen">Kitchen</option>
<option value="living">Living Room</option>
<option value="bedroom">Bedroom</option>
</select>

<label>Before Image</label>
<input type="file" id="before" required>

<label>During Image</label>
<input type="file" id="during" required>

<label>After Image</label>
<input type="file" id="after" required>

<button type="submit">Publish Project</button>

<button type="button" id="logout">Logout</button>

</form>

<!-- LIST OF PROJECTS -->
<div id="project-list" class="project-list"></div>

</div>


<script>

const supabaseUrl = "https://wpeewdryqprmmivevtsu.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwZWV3ZHJ5cXBybW1pdmV2dHN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjI5NTUsImV4cCI6MjA4ODgzODk1NX0.iEGsupGU9cm-irl6Yq00sz3YruxVmeW8IHQW62f7MbI";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);


const loginForm = document.getElementById("login-form");

const adminForm = document.getElementById("admin-form");

const logoutBtn = document.getElementById("logout");

const projectList = document.getElementById("project-list");


// CHECK LOGIN
async function checkSession(){

const { data } = await supabaseClient.auth.getSession();

if(data.session){

loginForm.style.display = "none";

adminForm.style.display = "block";

loadProjects();

}

}

checkSession();


// LOGIN
loginForm.addEventListener("submit", async (e)=>{

e.preventDefault();

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

const { error } = await supabaseClient.auth.signInWithPassword({

email:email,

password:password

});

if(error){

alert(error.message);

return;

}

loginForm.style.display="none";

adminForm.style.display="block";

loadProjects();

});


// LOGOUT
logoutBtn.addEventListener("click", async ()=>{

await supabaseClient.auth.signOut();

loginForm.style.display="block";

adminForm.style.display="none";

projectList.innerHTML="";

});


// PUBLISH PROJECT
adminForm.addEventListener("submit", async (e)=>{

e.preventDefault();

const category = document.getElementById("category").value;

const beforeFile = document.getElementById("before").files[0];

const duringFile = document.getElementById("during").files[0];

const afterFile = document.getElementById("after").files[0];


const beforeName = Date.now()+"-"+beforeFile.name;

const duringName = Date.now()+"-"+duringFile.name;

const afterName = Date.now()+"-"+afterFile.name;


// UPLOAD FILES
await supabaseClient.storage.from("projects").upload(beforeName,beforeFile);

await supabaseClient.storage.from("projects").upload(duringName,duringFile);

await supabaseClient.storage.from("projects").upload(afterName,afterFile);


// GET URLS
const beforeURL = supabaseClient.storage.from("projects").getPublicUrl(beforeName).data.publicUrl;

const duringURL = supabaseClient.storage.from("projects").getPublicUrl(duringName).data.publicUrl;

const afterURL = supabaseClient.storage.from("projects").getPublicUrl(afterName).data.publicUrl;


// INSERT INTO DATABASE
const { error } = await supabaseClient.from("projects").insert([{

category:category,

before_url:beforeURL,

during_url:duringURL,

after_url:afterURL

}]);


if(error){

alert(error.message);

return;

}

alert("Project Published!");

adminForm.reset();

loadProjects();

});


// LOAD PROJECT LIST
async function loadProjects(){

projectList.innerHTML="";

const { data } = await supabaseClient

.from("projects")

.select("*")

.order("created_at",{ascending:false});


data.forEach(project=>{

const div=document.createElement("div");

div.className="project-item";


div.innerHTML=`

<h4>${project.category.toUpperCase()} PROJECT</h4>

<div class="project-images">

<img src="${project.before_url}">

<img src="${project.during_url}">

<img src="${project.after_url}">

</div>

<button class="delete-btn">Delete</button>

`;


const deleteBtn=div.querySelector(".delete-btn");


deleteBtn.addEventListener("click",async ()=>{

if(!confirm("Delete this project?")) return;


// GET FILE NAMES
const beforeFile=project.before_url.split("/").pop();

const duringFile=project.during_url.split("/").pop();

const afterFile=project.after_url.split("/").pop();


// DELETE FILES
await supabaseClient.storage

.from("projects")

.remove([beforeFile,duringFile,afterFile]);


// DELETE ROW
await supabaseClient

.from("projects")

.delete()

.eq("id",project.id);


div.remove();

alert("Project Deleted");

});


projectList.appendChild(div);

});

}

</script>

</body>
</html>
